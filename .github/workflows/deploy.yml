name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/src/**"
      - "apps/api/package.json"
      - "apps/api/tsconfig*.json"
      - "apps/api/nest-cli.json"

jobs:
  deploy:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -w @zeladoria-inteligente/api

      - name: Build
        run: npm run build -w @zeladoria-inteligente/api

      - name: Create deployment package
        run: |
          mkdir -p /tmp/lambda-pkg
          cp apps/api/package.json /tmp/lambda-pkg/
          cp -r apps/api/dist /tmp/lambda-pkg/dist
          cd /tmp/lambda-pkg
          npm install --omit=dev --package-lock-only --ignore-scripts
          npm ci --omit=dev --ignore-scripts
          zip -r $GITHUB_WORKSPACE/deployment.zip dist/ node_modules/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name zeladoria-inteligente-api \
            --zip-file fileb://deployment.zip

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name zeladoria-inteligente-api
